<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Would You Grab?</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* INTRO */
#intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  max-width: 400px;
}
#intro h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
#intro p { font-size: 15px; color: #888; line-height: 1.7; margin-bottom: 24px; }
.hint-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
.hint { background: #1a1a1a; border: 1.5px solid #333; border-radius: 12px; padding: 14px 20px; text-align: center; }
.hint-icon { font-size: 24px; }
.hint-label { font-size: 11px; color: #555; font-weight: 600; margin-top: 4px; letter-spacing: 1px; }
.start-btn {
  background: #fff; color: #0f0f0f; border: none; border-radius: 14px;
  padding: 16px 48px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%;
}

/* GAME */
#game { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; padding: 16px 16px 24px; gap: 16px; }

.progress-wrap { width: 100%; max-width: 420px; margin-bottom: 12px; }
.progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.progress-label { font-size: 11px; color: #555; font-family: monospace; }
.progress-bar { height: 3px; background: #1a1a1a; border-radius: 2px; }
.progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.3s ease; }

.stack { position: relative; width: min(100%, 420px); height: min(100vw, 420px); flex-shrink: 0; margin: 0 auto; }
.card {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  overflow: hidden;
  background: #000000;
  cursor: grab;
  user-select: none;
  touch-action: none;
  will-change: transform;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card:active { cursor: grabbing; }
.card.next-card {
  transform: scale(0.95) translateY(12px);
  z-index: 0;
  pointer-events: none;
}
.card.top-card { z-index: 1; }

.card-img {
  width: 100%;
  height: auto;
  object-fit: contain;
  display: block;
  pointer-events: none;
  -webkit-user-drag: none;
  background: #000;
  width: 100%;
  height: 100%;
}

/* overlay badges */
.badge-grab, .badge-skip {
  position: absolute;
  top: 20px;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.1s;
  pointer-events: none;
  z-index: 10;
}
.badge-grab { left: 20px; background: #22c55e; color: #fff; transform: rotate(-12deg); }
.badge-skip { right: 20px; background: #ef4444; color: #fff; transform: rotate(12deg); }

.btns {
  display: flex;
  gap: 24px;
  align-items: center;
  margin-top: 16px;
  flex-shrink: 0;
}
.btn {
  width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
  font-size: 26px; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.92); }
.btn-skip { background: #1a1a1a; border: 2px solid rgba(239,68,68,0.4); color: #ef4444; }
.btn-grab { background: #1a1a1a; border: 2px solid rgba(34,197,94,0.4); color: #22c55e; }
.btn-hint { font-size: 11px; color: #444; font-family: monospace; text-align: center; }

/* RESULTS */
#results {
  display: none; flex-direction: column; align-items: center;
  width: 100%; max-width: 420px; padding: 28px 20px 40px; overflow-y: auto; max-height: 100vh;
}
#results h2 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 6px; text-align: center; }
.score-row { display: flex; gap: 12px; margin: 16px 0 20px; }
.score-box { flex: 1; border-radius: 12px; padding: 14px; text-align: center; }
.score-box.grabbed { background: #0d2010; border: 1.5px solid rgba(34,197,94,0.3); }
.score-box.skipped { background: #2d1010; border: 1.5px solid rgba(239,68,68,0.3); }
.score-num { font-size: 28px; font-weight: 800; }
.score-box.grabbed .score-num { color: #22c55e; }
.score-box.skipped .score-num { color: #ef4444; }
.score-lbl { font-size: 10px; color: #555; font-family: monospace; margin-top: 2px; letter-spacing: 1px; }

.reveal-box {
  background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 14px;
  padding: 18px 20px; margin-bottom: 14px; width: 100%;
}
.reveal-title { font-size: 10px; letter-spacing: 3px; color: #F0E830; font-family: monospace; margin-bottom: 10px; }
.reveal-text { font-size: 14px; color: #ccc; line-height: 1.8; }
.reveal-text strong { color: #fff; }
.sig-result { margin-top: 10px; padding: 10px 14px; background: #0f0f0f; border-radius: 8px; border-left: 3px solid #F0E830; }
.sig-result-main { font-size: 14px; color: #fff; font-weight: 700; }
.sig-result-sub { font-size: 13px; color: #888; margin-top: 3px; }

.debrief-title { font-size: 10px; letter-spacing: 3px; color: #555; font-family: monospace; margin-bottom: 10px; width: 100%; }
.debrief-line {
  background: #111; border: 1.5px solid #1e1e1e; border-radius: 10px;
  padding: 14px 16px; margin-bottom: 8px; cursor: pointer; width: 100%;
  font-size: 13px; color: #666; font-style: italic; line-height: 1.6;
  transition: all 0.2s;
}
.debrief-line.active {
  background: #1e1c00; border-color: #F0E830; color: #F0E830;
}

.replay-btn {
  width: 100%; background: #1a1a1a; border: 1.5px solid #333; color: #888;
  border-radius: 10px; padding: 14px; font-size: 12px; cursor: pointer;
  font-family: monospace; letter-spacing: 1px; margin-top: 6px;
}
</style>
</head>
<body>

<div id="intro">
  <div style="font-size:48px;margin-bottom:16px;">🍽️</div>
  <h1>Would You Grab? 🟢</h1>
  <p>6 restaurant cards — one at a time.<br><strong style="color:#fff">Gut reaction only.</strong><br>Would you order from this place — or keep scrolling?</p>
  <div class="hint-row">
    <div class="hint"><div class="hint-icon" style="color:#ef4444">✗</div><div class="hint-label">SKIP</div></div>
    <div class="hint"><div class="hint-icon" style="color:#22c55e">✓</div><div class="hint-label">GRAB</div></div>
  </div>
  <button class="start-btn" onclick="startGame()">Start →</button>
</div>

<div id="game">
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label" id="prog-label">1 / 6</span>
      <span class="progress-label">would you grab it?</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="stack" id="stack"></div>
  <div class="btns">
    <button class="btn btn-skip" onclick="swipe('skip')" id="btn-skip">✗</button>
    <div class="btn-hint">SKIP &nbsp;or&nbsp; GRAB</div>
    <button class="btn btn-grab" onclick="swipe('grab')" id="btn-grab">✓</button>
  </div>
</div>

<div id="results"></div>

var state = { cur: 0, results: [], activeDebrief: -1 };
var drag = { active: false, startX: 0, startY: 0, x: 0, y: 0, card: null };

function startGame() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  renderStack();
}

function renderStack() {
  var stack = document.getElementById('stack');
  stack.innerHTML = '';
  if (state.cur >= CARDS.length) { showResults(); return; }

  // Next card (behind)
  if (state.cur + 1 < CARDS.length) {
    var next = makeCard(CARDS[state.cur + 1], false);
    stack.appendChild(next);
  }

  // Top card
  var top = makeCard(CARDS[state.cur], true);
  stack.appendChild(top);

  // Update progress
  document.getElementById('prog-label').textContent = (state.cur + 1) + ' / ' + CARDS.length;
  document.getElementById('prog-fill').style.width = (state.cur / CARDS.length * 100) + '%';

  setupDrag(top);
}

function makeCard(c, isTop) {
  var div = document.createElement('div');
  div.className = 'card ' + (isTop ? 'top-card' : 'next-card');

  var img = document.createElement('img');
  img.className = 'card-img';
  img.src = c.img;
  img.draggable = false;
  div.appendChild(img);

  if (isTop) {
    var bg = document.createElement('div');
    bg.className = 'badge-grab';
    bg.id = 'badge-grab';
    bg.textContent = 'GRAB ✓';
    div.appendChild(bg);

    var bs = document.createElement('div');
    bs.className = 'badge-skip';
    bs.id = 'badge-skip';
    bs.textContent = 'SKIP ✗';
    div.appendChild(bs);
  }

  return div;
}

function setupDrag(card) {
  function onStart(e) {
    drag.active = true;
    drag.card = card;
    var pt = e.touches ? e.touches[0] : e;
    drag.startX = pt.clientX;
    drag.startY = pt.clientY;
    drag.x = 0; drag.y = 0;
    card.style.transition = 'none';
  }

  function onMove(e) {
    if (!drag.active) return;
    e.preventDefault();
    var pt = e.touches ? e.touches[0] : e;
    drag.x = pt.clientX - drag.startX;
    drag.y = pt.clientY - drag.startY;
    var rot = drag.x * 0.08;
    card.style.transform = 'translateX(' + drag.x + 'px) translateY(' + drag.y + 'px) rotate(' + rot + 'deg)';
    var pct = Math.min(Math.abs(drag.x) / 100, 1);
    if (drag.x > 30) {
      document.getElementById('badge-grab').style.opacity = pct;
      document.getElementById('badge-skip').style.opacity = 0;
    } else if (drag.x < -30) {
      document.getElementById('badge-skip').style.opacity = pct;
      document.getElementById('badge-grab').style.opacity = 0;
    } else {
      document.getElementById('badge-grab').style.opacity = 0;
      document.getElementById('badge-skip').style.opacity = 0;
    }
  }

  function onEnd(e) {
    if (!drag.active) return;
    drag.active = false;
    var threshold = 80;
    if (drag.x > threshold) { animateOut('grab'); }
    else if (drag.x < -threshold) { animateOut('skip'); }
    else {
      card.style.transition = 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
      card.style.transform = '';
      document.getElementById('badge-grab').style.opacity = 0;
      document.getElementById('badge-skip').style.opacity = 0;
    }
  }

  card.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  card.addEventListener('touchstart', onStart, {passive: true});
  card.addEventListener('touchmove', onMove, {passive: false});
  card.addEventListener('touchend', onEnd);
}

function animateOut(choice) {
  var card = document.querySelector('.top-card');
  if (!card) return;
  var tx = choice === 'grab' ? 600 : -600;
  var rot = choice === 'grab' ? 20 : -20;
  card.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s';
  card.style.transform = 'translateX(' + tx + 'px) rotate(' + rot + 'deg)';
  card.style.opacity = '0';
  state.results.push({ card: CARDS[state.cur], choice: choice });
  state.cur++;
  setTimeout(renderStack, 380);
}

function swipe(choice) { animateOut(choice); }

function showResults() {
  document.getElementById('game').style.display = 'none';
  var grabbed = state.results.filter(function(r) { return r.choice === 'grab'; }).length;
  var skipped = state.results.filter(function(r) { return r.choice === 'skip'; }).length;
  var sigResults = state.results.filter(function(r) { return r.card.hasSignal; });
  var sigGrabbed = sigResults.filter(function(r) { return r.choice === 'grab'; }).length;

  var sigMsg = sigGrabbed === 2
    ? "You grabbed both signal cards. The snippets worked. 👀"
    : sigGrabbed === 1
    ? "One signal card got you. What made the other one miss?"
    : "Even with review snippets, you weren't convinced. Why not?";

  var face = grabbed >= 4 ? "😋" : grabbed >= 2 ? "🤔" : "😤";

  var debriefHtml = DEBRIEF.map(function(line, i) {
    return '<div class="debrief-line" id="deb-' + i + '" onclick="setDebrief(' + i + ')">' + line + '</div>';
  }).join('');

  var el = document.getElementById('results');
  el.style.display = 'flex';
  el.innerHTML =
    '<div style="font-size:40px;margin-bottom:12px;">' + face + '</div>' +
    '<h2>Would You Grab? 🟢</h2>' +
    '<div class="score-row">' +
      '<div class="score-box grabbed"><div class="score-num">' + grabbed + '</div><div class="score-lbl">GRABBED</div></div>' +
      '<div class="score-box skipped"><div class="score-num">' + skipped + '</div><div class="score-lbl">SKIPPED</div></div>' +
    '</div>' +
    '<div class="reveal-box">' +
      '<div class="reveal-title">THE REVEAL</div>' +
      '<div class="reveal-text">Cards <strong style="color:#ef4444">1, 2, 3, 5</strong> had no review signals.<br>Cards <strong style="color:#22c55e">4, 6</strong> had a review snippet.</div>' +
      '<div class="sig-result"><div class="sig-result-main">You grabbed ' + sigGrabbed + ' of 2 signal cards.</div><div class="sig-result-sub">' + sigMsg + '</div></div>' +
    '</div>' +
    '<div class="debrief-title">FACILITATOR — CLICK TO READ OUT</div>' +
    debriefHtml +
    '<div class="reveal-box" style="margin-top:6px;">' +
      '<div class="reveal-title">DROP IN CHAT NOW</div>' +
      '<div class="reveal-text" style="font-style:italic;">"Which card made you most confident — and what made you hesitate on the others?"</div>' +
    '</div>' +
    '<button class="replay-btn" onclick="replay()">↩ Play Again</button>';
}

function setDebrief(i) {
  document.querySelectorAll('.debrief-line').forEach(function(el, idx) {
    el.classList.toggle('active', idx === i);
  });
}

function replay() {
  state = { cur: 0, results: [], activeDebrief: -1 };
  document.getElementById('results').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  renderStack();
}
</script>
</body>
</html>
