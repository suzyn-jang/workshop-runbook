<script>
// ── DATA ──────────────────────────────────────────────────────

var PHASES = [
  { id:"welcome", no:"00", label:"OPEN THE ROOM", clock:"0:00 – 0:05", duration:5, role:"FACILITATOR LEADS",
    goal:"Energy in. Everyone oriented. Groups announced.",
    sections:[
      { type:"say", heading:"Opening words",
        body:"\"Hi everyone — both in the room and on the call, welcome. Give me a thumbs up in chat if you can hear me. [pause]\n\nBefore I do anything, I want to start with one question. Think about the last time you opened a food app and just… couldn't decide. You scrolled, nothing felt right, and you ended up ordering from the same place again.\n\n[pause]\n\nThat moment — that paralysis — is the exact problem we're solving today.\n\nI'm [name]. For the next 90 minutes we're going to move from that problem to real, concrete ideas. Not just a conversation. Actual output.\"" },
      { type:"do", heading:"Show agenda — 60 sec only",
        body:"Flash the full timeline on screen. Say: 'Five phases, strict timebox. I'll be the timekeeper so you can focus on thinking.' Don't explain every phase — just show it exists." },
      { type:"do", heading:"Announce groups immediately",
        body:"Pre-assign before the workshop. Read aloud or show on screen:\n\n• Group 1 — [names] → Persona: The Busy Worker 😩\n• Group 2 — [names] → Persona: The Adventurous Foodie 🌟\n• Group 3 — [names] → Persona: The New User 🆕\n• Group 4 — [names] → Persona: The Traveler ✈️\n\n'In-room folks, move to your table now. Remote folks, breakout rooms are opening.'" },
      { type:"tip", heading:"Facilitator note",
        body:"Keep this tight — 5 minutes max. Energy at the start sets the tone for everything that follows. Move fast, be warm, then get out of the way." }
    ]
  },
  { id:"icebreaker", no:"01", label:"WOULD YOU GRAB?", clock:"0:05 – 0:15", duration:10, role:"FULL ROOM",
    goal:"Break the ice AND immediately make everyone feel the user problem.",
    sections:[
      { type:"say", heading:"Introduce the activity",
        body:"\"Before we dive in, we're going to do something quick together. It's called 'Would You Grab?' — takes exactly 2 minutes.\n\nI'll show you 6 restaurant cards one at a time, just like Grab. Your only job: gut reaction. Would you click in — or keep scrolling?\n\nNo overthinking. Just instinct.\n\nEveryone ready? I'm launching it now on screen.\"" },
      { type:"do", heading:"Run the activity — 2 min", wyg:true,
        body:"Click the button below to launch the game on screen share.\n\nWhile people play:\n• Watch the energy — people will react, laugh, debate\n• Let it breathe — don't narrate over it\n• 30-sec heads up: 'Almost done — last card coming up'", timer:"2:00" },
      { type:"say", heading:"Debrief — 5 min",
        body:"\"Quick show of hands — who skipped more than 3? [pause]\n\nWho grabbed Card 5 or 6 — the ones with the review snippet? [pause]\n\nCards 1–4 had no review signals. Cards 5–6 had a snippet and social proof.\n\nThat hesitation you felt on the first four? That's what our users feel every time they browse Grab.\n\n4.9% of sessions ever reach the review page. Most users never see reviews at all.\n\nOne word in chat — what made you hesitate?\"" },
      { type:"do", heading:"Bridge into context",
        body:"Read 3–4 words from chat. Then:\n\n'Hold those instincts — they're going to come back in ideation. Let's look at the data behind what you just felt.'" },
      { type:"tip", heading:"Why this works",
        body:"Most icebreakers are disconnected from the work. This one IS the work. By the time debrief ends, everyone has personally felt the user's hesitation — ideation starts from empathy, not abstraction." }
    ]
  },
  { id:"context", no:"02", label:"CONTEXT & INSPIRATION", clock:"0:15 – 0:30", duration:15, role:"FACILITATOR LEADS",
    goal:"Same problem, same data, same principles. Groups leave oriented and inspired.",
    sections:[
      { type:"say", heading:"Frame the problem",
        body:"\"Before your groups start, let's make sure we're all solving the same thing.\n\nHere's what the data tells us.\"" },
      { type:"do", heading:"Show 4 data points — one at a time",
        body:"Put on screen one by one. Read aloud. Pause between each.\n\n📉 'Homepage and discovery surfaces have lower CTR than Search.'\n📊 'Only 4.9% of sessions ever reach the review listing.'\n📈 'When users interact with reviews — CTR and CVR are both higher.'\n✅ 'Review snippets already increase CTR in Search. Trust signals work. They're just not visible in discovery yet.'\n\nThen: 'The gap is simple. Reviews work where they're visible. They're invisible where users need them most.'" },
      { type:"do", heading:"Inspiration sharing — 5 min",
        body:"Show 2–3 examples of trust signals done well elsewhere. Conversation starters, not answers.\n\n• Google Maps — 'Popular dish' badges pulled from reviews\n• Airbnb — Guest favourite tags with review count\n• TripAdvisor — 'Traveller's Choice' with specific quote\n• TikTok FYP — social proof baked into discovery\n\nSay: 'These aren't templates. They're proof that this problem is solvable. Now let's find our version.'" },
      { type:"do", heading:"Hand out persona cards — 2 min silent read",
        body:"Each group gets ONE persona card. 2 minutes to read silently.\n\n😩 Group 1 — The Busy Worker\nSick of eating the same food every day. Wants to try new places but has no time to explore. Always defaults to the familiar.\nFocus: 'What signal makes a new place feel safe enough to try with zero research time?'\n\n🌟 Group 2 — The Adventurous Foodie\nAlways open to great new food — but spends ages validating. Reads every review, checks photos, opens Google Maps. Hates wasting a meal.\nFocus: 'What signal cuts their research time without cutting their confidence?'\n\n🆕 Group 3 — The New User\nDoesn't know what's good on Grab. Searches only restaurants they already know by name. Never ventures beyond familiar.\nFocus: 'What signal gives someone with zero Grab history a reason to try something new?'\n\n✈️ Group 4 — The Traveler\nWants genuinely great local food. Refuses to eat chains from home. Won't waste a meal. Uses every tool to find the real thing.\nFocus: 'What signal tells a visitor: this is what locals actually eat here?'" },
      { type:"say", heading:"Give the design challenge",
        body:"\"Your group's job for the next 30 minutes:\n\n'How might we surface review signals earlier in discovery to give YOUR persona confidence — before they ever click into a restaurant page?'\n\nThree principles:\n→ Less clutter  →  Easy to scan  →  Relevant and useful\n\nAny questions? [Max 2. If it spirals: 'Bring it into your group.']\n\nBreakout rooms are open. Go.\"" }
    ]
  },
  { id:"ideation", no:"03", label:"GROUP IDEATION SESSION", clock:"0:30 – 1:00", duration:30, role:"GROUP ACTIVITY",
    goal:"Every person contributes ideas. Group votes once internally. One strong idea moves forward per group.",
    sections:[
      { type:"do", heading:"What each group has in front of them",
        body:"① PERSONA CARD — one specific user, their frustration, their focus question\n② DATA CONTEXT (same for all)\n   📉 Homepage CTR < Search CTR\n   📊 4.9% of sessions reach the review listing\n   📈 Review interaction = higher CTR & CVR\n   ✅ Review snippets work in Search already\n③ DESIGN CHALLENGE — HMW surface review signals to give [persona] confidence before they click?\n④ THREE PRINCIPLES — Less clutter · Easy to scan · Relevant & useful" },
      { type:"activity", tag:"PHASE A · 8 MIN", heading:"Silent Solo Brainstorm", timer:"8:00",
        body:"Each person writes ideas ALONE. One idea per sticky / FigJam card. No talking.\n\nPrompt on screen: 'What review signal could help YOUR persona decide — without adding clutter?'\n\nPersona nudges:\n😩 Busy Worker: 'What works in under 3 seconds? They won't stop scrolling for anything slower.'\n🌟 Foodie: 'What replaces 10 minutes of research with one glance?'\n🆕 New User: 'What signal works when someone has never ordered here before?'\n✈️ Traveler: 'What makes a restaurant feel like a local secret, not a tourist default?'\n\nMinimum 4 ideas per person. No editing — just generate.\nWHY SILENT: Loudest voice wins otherwise. This equalises everyone." },
      { type:"activity", tag:"PHASE B · 10 MIN", heading:"Share & Cluster", timer:"10:00",
        body:"Round-robin: each person reads ONE sticky aloud, places it on the board. No judgment — just listening. Repeat until all up.\n\nThen: group similar ideas into clusters. Name each in 2–3 words. Aim for 3–5 clusters.\n\nIf a group gets stuck:\n😩 'At what moment does this Busy Worker open Grab — commute? lunch break? late night?'\n🌟 'What's the one phrase in a review that would make the Foodie stop scrolling instantly?'\n🆕 'What would you show on someone's very first Grab Food order?'\n✈️ 'What would make this feel like a recommendation from a local friend, not an algorithm?'" },
      { type:"activity", tag:"PHASE C · 7 MIN", heading:"Group Dot Vote", timer:"7:00",
        body:"Each person gets 3 votes (dot stickers or FigJam stamps).\n\nRules:\n• Vote for highest impact for YOUR persona\n• Stack all 3 on one if you believe in it\n• Vote on impact — NOT feasibility\n\nTop idea = what they pitch.\n\nNote: This is the ONLY vote today. Groups vote internally — not against each other." },
      { type:"activity", tag:"PHASE D · 5 MIN", heading:"Pitch Prep", timer:"5:00",
        body:"Groups prep a 2-minute pitch for their top idea.\n\nMust cover:\n1. What is the idea? (one sentence)\n2. Which persona — at what moment in their journey?\n3. What review signal does it use?\n4. What would we test first?\n\nOne person leads, anyone can add. Pick the most excited person to present." },
      { type:"tip", heading:"While groups work — your moves",
        body:"• Float between groups every 4–5 min. Don't park in one place.\n• Going in circles → 'You have [X] min. Pick the most interesting idea and prep it.'\n• Too quiet → 'What signal would have changed your Would You Grab answer just now?'\n• Ideas too safe → 'What's the wildest version? Now dial it back by half.'\n• 5-min warning to ALL: 'Five minutes — make sure you know your pitch.'" }
    ]
  },
  { id:"present", no:"04", label:"GROUP IDEA SHARING", clock:"1:00 – 1:20", duration:20, role:"FULL ROOM",
    goal:"Each group shares their top idea. Room listens, reacts, learns from each other.",
    sections:[
      { type:"say", heading:"Bring everyone back",
        body:"\"Welcome back. Each group gets 2 minutes to share their top idea — the one that got the most votes internally. I'll keep time so everyone gets a fair shot.\n\nAfter each pitch: drop ONE word in the chat. 'Bold', 'needed', 'risky', 'exciting' — anything honest. One word only.\n\nGroup 1 — you're up.\"" },
      { type:"do", heading:"Per group — repeat 4x", timer:"2:00",
        body:"• Start 2-min timer visibly on screen\n• At 1:45 — signal: 'Wrap up in 15 seconds'\n• After pitch → 'Chat: one word. Go.' Read 3–4 words aloud\n• Reflect one: 'Interesting that this feels like a trust play to people'\n• One genuine observation about the idea\n• Move to next group — keep momentum" },
      { type:"tip", heading:"If a group goes over time",
        body:"Say warmly but firmly: 'I'm going to stop you there — great stuff, I want every group to get their moment.' Don't apologise. The room will respect the fairness." },
      { type:"tip", heading:"If an idea is vague",
        body:"One question only: 'At what exact moment in the user's journey does this signal appear?' That forces specificity without embarrassing anyone." },
      { type:"tip", heading:"No cross-group voting today",
        body:"Voting happened inside each group already. This sharing session is about learning from each angle — not competition. Let the ideas breathe." }
    ]
  },
  { id:"close", no:"05", label:"END", clock:"1:20 – 1:30", duration:10, role:"FACILITATOR LEADS",
    goal:"Clear next steps. People leave knowing what happens next.",
    sections:[
      { type:"say", heading:"Closing words",
        body:"\"I want to take 30 seconds to appreciate what just happened.\n\nYou came in as people who don't work together every day. And in 90 minutes — you produced four concrete ideas, each grounded in a real user.\n\nHere's what happens next.\"" },
      { type:"do", heading:"State next steps clearly — out loud",
        body:"Be specific. Don't leave this vague.\n\n'[Name] will collect all four ideas into a shared doc by [date].'\n'We'll review them as a team in [channel / next sync].'\n'The goal is to pick 1–2 to take into the next sprint / validation round.'\n\nIf an idea already has a clear owner → name them now. That's a commitment made in front of the group." },
      { type:"say", heading:"Thank everyone genuinely",
        body:"\"Thank you — really. For showing up with energy, for taking this seriously, and for being willing to think out loud together.\n\nI'll drop a summary in Slack within 24 hours.\n\nSee you in [next touchpoint].\"" },
      { type:"do", heading:"Post-workshop — within 24 hours",
        body:"Send to Slack:\n📸 Screenshot of each group's idea board\n📋 4 ideas summarised in one line each\n📌 Next steps with names and dates\n💬 One genuine moment: 'My favourite idea from today was [X] because [why]'" }
    ]
  }
];

var PERSONAS = [

    focus:"What signal makes a new place feel safe enough to try with zero research time?" },
  { group:"Group 2", no:"02", name:"The Adventurous Foodie", emoji:"🌟",
    traits:["Always open to trying great new food","Spends a long time validating — reads reviews, checks photos, opens Google Maps","Doesn't want to waste their appetite or meal time","High standards, high effort — looking for a shortcut they can trust"],
    focus:"What signal cuts their research time without cutting their confidence?" },
  { group:"Group 3", no:"03", name:"The New User", emoji:"🆕",
    traits:["Doesn't know what's good on Grab","Only searches restaurants they already know by name","Never ventures beyond the familiar","Has no Grab history to lean on — starting from zero"],
    focus:"What signal gives someone with zero Grab history a reason to try something new?" },
  { group:"Group 4", no:"04", name:"The Traveler", emoji:"✈️",
    traits:["Wants genuinely great local food — not chains from home","Refuses to waste a single meal on somewhere mediocre","Uses every tool available: Google Maps, TripAdvisor, ask locals","Time-limited — every bad meal costs something real"],
    focus:"What signal tells a visitor: this is what locals actually eat here?" }
];

var PHASE_COLORS = ["#1A1A1A","#0A6B3C","#1A3A6B","#5A1A8B","#8B5A1A","#4A4A4A"];

var TYPE_COLORS = { say:"#1A4A28", do:"#1A2A4A", tip:"#4A3A1A", activity:"#3A1A5A" };

var currentTab = "script";
var currentPhase = 0;
var checked = {};
var timers = {};

function el(id) { return document.getElementById(id); }

function switchTab(tab) {
  currentTab = tab;
  ["script","personas","timeline"].forEach(function(t) {
    el("tab-"+t).classList.toggle("active", t === tab);
  });
  el("phase-nav").style.display = tab === "script" ? "flex" : "none";
  render();
}

function goPhase(i) {
  currentPhase = i;
  renderPhaseNav();
  renderScript();
}

function toggleCheck(phaseId, idx) {
  checked[phaseId+"-"+idx] = !checked[phaseId+"-"+idx];
  render();
}

// ── TIMERS ──
function createTimer(duration, cid) {
  var parts = duration.split(":").map(Number);
  var total = parts[0]*60 + (parts[1]||0);
  if (!timers[cid]) timers[cid] = { secs:total, total:total, running:false, done:false, iv:null };
  var t = timers[cid];
  var w = el(cid);
  if (!w) return;
  var pct = (t.total-t.secs)/t.total*100;
  var circ = 2*Math.PI*14;
  var offset = circ*(1-pct/100);
  var m = String(Math.floor(t.secs/60)).padStart(2,"0");
  var s = String(t.secs%60).padStart(2,"0");
  w.className = "timer-wrap" + (t.done?" done":"");
  w.innerHTML = '<svg class="timer-svg" width="36" height="36">'
    +'<circle cx="18" cy="18" r="14" fill="none" stroke="#D8D3C8" stroke-width="2"/>'
    +'<circle cx="18" cy="18" r="14" fill="none" stroke="'+(t.done?"#1A6B3C":"#C8A96E")+'" stroke-width="2"'
    +' stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" style="transition:stroke-dashoffset 1s linear"/>'
    +'</svg>'
    +'<span class="timer-display" style="color:'+(t.done?"#1A6B3C":"#1A1A1A")+'">'+m+":"+s+'</span>'
    +'<div class="timer-btns">'
    +(!t.done?'<button class="timer-btn-start'+(t.running?" running":"")+'" onclick="timerToggle(\''+cid+'\')">'+(t.running?"PAUSE":"START")+'</button>':"")
    +'<button class="timer-btn-reset" onclick="timerReset(\''+cid+'\',\''+duration+'\')">RESET</button>'
    +'</div>'
    +(t.done?'<span class="timer-done-label">COMPLETE</span>':"");
}

function timerToggle(id) {
  var t = timers[id]; if(!t) return;
  if (t.running) { clearInterval(t.iv); t.running=false; }
  else {
    t.running=true;
    t.iv = setInterval(function(){
      t.secs--;
      if(t.secs<=0){clearInterval(t.iv);t.running=false;t.done=true;t.secs=0;}
      createTimer("",id);
    },1000);
  }
  createTimer("",id);
}

function timerReset(id,duration) {
  var t=timers[id]; if(!t) return;
  clearInterval(t.iv);
  var parts=duration.split(":").map(Number);
  t.secs=parts[0]*60+(parts[1]||0); t.total=t.secs; t.running=false; t.done=false;
  createTimer(duration,id);
}

      return '<div onclick="wygSetDebrief('+i+')" style="background:'+(active?'#1e1c00':'#111')+';border:1.5px solid '+(active?'#F0E830':'#1e1e1e')+';border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;">'
        +'<div style="font-size:13px;color:'+(active?'#F0E830':'#666')+';font-style:italic;line-height:1.6;">'+(active?"🗣️ ":"")+line+'</div>'
        +'</div>';
    }).join("");

    g.innerHTML =
      '<div style="background:#0f0f0f;font-family:Georgia,serif;padding:28px 20px 60px;">'
      +'<div style="max-width:380px;margin:0 auto;">'
      +'<div style="text-align:center;margin-bottom:24px;">'
      +'<div style="font-size:42px;margin-bottom:10px;">'+face+'</div>'
      +'<h2 style="font-size:23px;font-weight:800;color:#fff;margin:0 0 6px;">Would You Grab? 🟢</h2>'
      +'<div style="display:flex;gap:14px;justify-content:center;margin-top:14px;">'
      +'<div style="background:#0d2010;border:1.5px solid rgba(34,197,94,0.3);border-radius:10px;padding:10px 20px;text-align:center;"><div style="font-size:26px;font-weight:800;color:#22c55e;">'+grabbed+'</div><div style="font-size:10px;color:#555;font-family:monospace;">GRABBED</div></div>'
      +'<div style="background:#2d1010;border:1.5px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 20px;text-align:center;"><div style="font-size:26px;font-weight:800;color:#ef4444;">'+skipped+'</div><div style="font-size:10px;color:#555;font-family:monospace;">SKIPPED</div></div>'
      +'</div></div>'
      +'<div style="background:#1a1a1a;border-radius:14px;padding:18px 20px;margin-bottom:14px;border:1.5px solid #2a2a2a;">'
      +'<div style="font-size:10px;letter-spacing:3px;color:#F0E830;font-family:monospace;margin-bottom:10px;">THE REVEAL</div>'
      +'<div style="font-size:14px;color:#ccc;line-height:1.8;">Cards <strong style="color:#ef4444;">1–4</strong> had no review signals.<br/>Cards <strong style="color:#22c55e;">5–6</strong> had review snippets + social proof.</div>'
      +'<div style="margin-top:12px;padding:12px 14px;background:#0f0f0f;border-radius:8px;border-left:3px solid #F0E830;">'
      +'<div style="font-size:14px;color:#fff;font-weight:700;">You grabbed '+sigY+' of 2 signal cards.</div>'
      +'<div style="font-size:13px;color:#888;margin-top:4px;">'+sigMsg+'</div>'
      +'</div></div>'
      +'<div style="margin-bottom:18px;">'
      +'<div style="font-size:10px;letter-spacing:3px;color:#555;font-family:monospace;margin-bottom:10px;">FACILITATOR — CLICK TO READ OUT</div>'
      +debH+'</div>'
      +'<div style="background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:18px;">'
      +'<div style="font-size:10px;letter-spacing:3px;color:#999;font-family:monospace;margin-bottom:6px;">DROP IN CHAT NOW</div>'
      +'<div style="font-size:14px;font-weight:700;color:#0f0f0f;line-height:1.5;">"Which restaurant would you Grab — and what made you hesitate on the others?"</div>'
      +'<div style="font-size:12px;color:#888;margin-top:5px;">Those reasons = the trust signals we\'re designing today.</div>'
      +'</div>'
      +'<button onclick="wyg={phase:\'swipe\',cur:0,results:[],dir:null,dIdx:0,busy:false};wygRender();" style="width:100%;background:#1a1a1a;border:1.5px solid #333;color:#888;border-radius:10px;padding:12px;font-size:12px;cursor:pointer;font-family:monospace;letter-spacing:1px;">↩ PLAY AGAIN</button>'
      +'</div></div>';
  }
}

// ── INIT ──
render();
</script>
